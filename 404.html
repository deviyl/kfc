<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/png" href="/kfc/images/favicon.png">
    <link rel="stylesheet" href="/kfc/nav.css">
    <link rel="stylesheet" href="/kfc/404style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <section class="hero">
            <div class="hero-bg-grid"></div>
            <div class="hero-glow hero-glow-1"></div>
            <div class="hero-glow hero-glow-2"></div>
            <div class="hero-inner">
                <img src="/kfc/images/banner.png" alt="KFC Tools" class="hero-banner">
            </div>
        </section>

        <section class="error-container">
            <div class="error-content">
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-description">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <p class="error-path">
                    <span class="error-label">Attempted URL:</span>
                    <code id="error-url"></code>
                </p>
                <div class="error-actions">
                    <a href="/kfc/" class="error-button error-button-primary">Return to Home</a>
                    <a href="/kfc/" class="error-button error-button-secondary">Browse Tools</a>
                </div>
                <p class="error-note">
                    This invalid request has been logged for review.
                </p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <a href="https://www.torn.com/profiles.php?XID=3722358" class="footer-logo" target="_blank" rel="noopener">DEVIYL</a>
        <span class="footer-sep">·</span>
        <a href="https://www.torn.com/profiles.php?XID=3913421" class="footer-logo" target="_blank" rel="noopener">WOLFYLEIN</a>
        <span class="footer-sep">·</span>
        <span class="footer-text">KFC Tools</span>
    </footer>

    <script src="/kfc/nav.js"></script>
    <script src="/kfc/404script.js"></script>
</body>
</html>
