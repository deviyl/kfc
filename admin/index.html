<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/deviyl/icon/refs/heads/main/devicon-modified.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/kfc/nav.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="admin-container">
        <div id="authPanel" class="auth-panel">
            <div class="auth-card">
                <h1>Admin Panel</h1>
                
                <form id="authForm" class="auth-form">
                    <div class="form-group">
                        <label for="adminPassword">Admin Password</label>
                        <input 
                            type="password" 
                            id="adminPassword" 
                            placeholder="Enter admin password"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Access Admin Panel</button>
                    <div id="authError" class="error-message" style="display: none;"></div>
                </form>
            </div>
        </div>

        <div id="admin-content" style="display: none;">
            <div class="page-header">
                <h1>Admin Panel</h1>
                <hr>
            </div>

            <div class="main-container">
                <div id="cards-container" class="cards-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="/kfc/nav.js"></script>
</body>
</html>
