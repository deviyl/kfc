<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/deviyl/icon/refs/heads/main/devicon-modified.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/kfc/nav.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <div id="auth-panel" class="auth-container">
        <div class="auth-card">
            <h2>Security Check</h2>
            <p>Enter administrative password to proceed.</p>
            <div class="auth-input-group">
                <input type="password" id="password-input" placeholder="Password...">
                <button id="login-btn">Verify</button>
            </div>
            <p id="error-msg" class="error-text" style="display: none;">Invalid password. Access denied.</p>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="page-header">
            <h1>Admin Panel</h1>
            <hr>
        </div>

        <div class="main-container">
            <div class="cards-grid">
                <a href="https://www.wolftimer.com/WarPayout/" target="_blank" class="link-card">
                    <div class="card-header">
                        <span class="card-title">War Tracker</span>
                    </div>
                    <div class="card-body">
                        <p class="card-description">Monitor war progress and payout calculations.</p>
                    </div>
                </a>

                <a href="https://wolftimer.com/index2.html" target="_blank" class="link-card">
                    <div class="card-header">
                        <span class="card-title">Special Wolf Timer</span>
                    </div>
                    <div class="card-body">
                        <p class="card-description">Access the alternative Wolf Timer interface.</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="/kfc/nav.js"></script>
</body>
</html>
