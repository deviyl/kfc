<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wolf Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-left">
        <button id="menuBtn">☰</button>
        <h2>ARCHIVE</h2>
    </div>
</header>

<!-- DROPDOWN MENU -->
<div class="dropdown" id="dropdown">
    <a class="nav-link" href="#dashboard">Dashboard</a>
    <a class="nav-link" href="#members">Members</a>
    <a class="nav-link" href="#logs">Logs</a>
</div>

<!-- MAIN -->
<main class="main">

    <!-- DASHBOARD -->
    <div class="page" id="dashboard">
        <h1 class="page-title">DASHBOARD</h1>
        <p>Welcome to your infernal control panel.</p>
    </div>

    <!-- MEMBERS -->
    <div class="page" id="members">
        <h1 class="page-title">MEMBER REGISTRY</h1>

        <div class="filter-bar">
            <button class="active">All</button>
            <button>In Crime</button>
            <button>Unassigned</button>
        </div>

        <div class="table-container">
            <table class="wolf-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Role</th>
                    <th>Weight</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>Fenrir</td>
                    <td><span class="status active">In Crime</span></td>
                    <td>Mastermind</td>
                    <td><div class="impact high"><span></span></div></td>
                </tr>
                <tr>
                    <td>Nyx</td>
                    <td><span class="status idle">Unassigned</span></td>
                    <td>-</td>
                    <td><div class="impact none"><span></span></div></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- LOGS -->
    <div class="page" id="logs">
        <h1 class="page-title">SYSTEM LOGS</h1>
        <p>No recent activity recorded.</p>
    </div>

</main>

<script>
    const menuBtn = document.getElementById("menuBtn");
    const dropdown = document.getElementById("dropdown");
    const pages = document.querySelectorAll(".page");
    const navLinks = document.querySelectorAll(".nav-link");

    // Toggle dropdown
    menuBtn.addEventListener("click", () => {
        dropdown.classList.toggle("open");
    });

    // Close when clicking outside
    document.addEventListener("click", (e) => {
        if (!dropdown.contains(e.target) && !menuBtn.contains(e.target)) {
            dropdown.classList.remove("open");
        }
    });

    // Router
    function showPage() {
        let hash = window.location.hash.substring(1);
        if (!hash) hash = "dashboard";

        pages.forEach(p => p.classList.remove("active"));

        const active = document.getElementById(hash);
        if (active) active.classList.add("active");

        navLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute("href") === "#" + hash) {
                link.classList.add("active");
            }
        });
    }

    window.addEventListener("hashchange", showPage);
    showPage();
</script>

</body>
</html>

<style>
    /* RESET */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Cinzel', serif;
    }

    /* BACKGROUND */
    body {
        background: url('bg.jpg') no-repeat center center/cover;
        min-height: 100vh;
        color: white;
        position: relative;
    }

    /* OVERLAY */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(2px);
        z-index: 0;
    }

    /* NAVBAR */
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 15px 20px;

        background: rgba(10, 0, 0, 0.7);
        backdrop-filter: blur(10px);

        border-bottom: 1px solid rgba(255,0,0,0.3);

        display: flex;
        align-items: center;
        z-index: 1000;
    }

    .nav-left {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .navbar h2 {
        color: #ff2e2e;
        text-shadow: 0 0 10px red;
    }

    /* MENU BUTTON */
    #menuBtn {
        background: transparent;
        border: 1px solid rgba(255,0,0,0.5);
        color: #ff4d4d;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
    }

    /* DROPDOWN */
    .dropdown {
        position: fixed;
        top: 60px;
        left: 20px;

        background: rgba(10, 0, 0, 0.9);
        backdrop-filter: blur(10px);

        border: 1px solid rgba(255,0,0,0.3);
        border-radius: 10px;

        padding: 10px;
        width: 180px;

        opacity: 0;
        transform: translateY(-10px);
        pointer-events: none;

        transition: 0.25s ease;
        z-index: 999;
    }

    .dropdown.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }

    /* LINKS */
    .dropdown a {
        display: block;
        padding: 10px;
        color: #ccc;
        text-decoration: none;
        border-radius: 6px;
    }

    .dropdown a:hover,
    .dropdown a.active {
        background: rgba(255,0,0,0.2);
        color: #fff;
    }

    /* MAIN */
    .main {
        padding: 100px 30px 30px;
        position: relative;
        z-index: 1;
    }

    /* PAGES */
    .page {
        display: none;
    }

    .page.active {
        display: block;
    }

    /* TITLE */
    .page-title {
        margin-bottom: 20px;
        color: #ff3b3b;
        text-shadow: 0 0 10px red;
    }

    /* FILTER */
    .filter-bar {
        margin-bottom: 20px;
    }

    .filter-bar button {
        margin-right: 10px;
        padding: 8px 14px;
        border: 1px solid rgba(255,0,0,0.4);
        background: transparent;
        color: #ccc;
        border-radius: 6px;
        cursor: pointer;
    }

    .filter-bar button:hover,
    .filter-bar .active {
        background: rgba(255,0,0,0.3);
        color: #fff;
    }

    /* TABLE */
    .table-container {
        background: rgba(10,10,10,0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,0,0,0.3);
        border-radius: 10px;
        overflow: hidden;
    }

    .wolf-table {
        width: 100%;
        border-collapse: collapse;
    }

    .wolf-table th {
        background: linear-gradient(#2a0000, #550000);
        padding: 12px;
        color: #ff4d4d;
    }

    .wolf-table td {
        padding: 12px;
        border-bottom: 1px solid rgba(255,0,0,0.1);
    }

    .wolf-table tr:hover {
        background: rgba(255,0,0,0.1);
    }

    /* STATUS */
    .status {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .status.active {
        background: rgba(255,0,0,0.3);
        color: #ff4d4d;
    }

    .status.idle {
        background: rgba(255,255,255,0.1);
        color: #aaa;
    }

    /* IMPACT */
    .impact {
        width: 100%;
        height: 8px;
        background: rgba(255,0,0,0.1);
        border-radius: 10px;
        overflow: hidden;
    }

    .impact span {
        display: block;
        height: 100%;
        background: linear-gradient(to right, #ff0000, #ff4d4d);
    }

    .impact.low span { width: 30%; }
    .impact.medium span { width: 60%; }
    .impact.high span { width: 90%; }
    .impact.none span { width: 0%; }
</style>
